<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirmación de Pago - CanchaLibre</title>

    <script defer src="/__/firebase/10.7.1/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.7.1/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=false"></script>

    <style media="screen">
      body { background: #f0f2f5; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
      #card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
      h1 { color: #4CAF50; margin-bottom: 10px; }
      p { color: #666; line-height: 1.6; }
      .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .success-icon { font-size: 50px; color: #4CAF50; margin-bottom: 20px; }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="loading">
        <div class="loader"></div>
        <p>Procesando tu pago en el sistema...</p>
      </div>
      <div id="content" style="display: none;">
        <div class="success-icon">✔</div>
        <h1>¡Pago Exitoso!</h1>
        <p>Hemos actualizado tu reserva. Ya puedes cerrar esta ventana y volver a la aplicación para ver los detalles.</p>
        <p><strong>CanchaLibre</strong></p>
      </div>
      <div id="error" style="display: none;">
        <h1 style="color: #f44336;">Error</h1>
        <p id="error-msg">No se pudo identificar la reserva.</p>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        try {
          const db = firebase.firestore();
          const urlParams = new URLSearchParams(window.location.search);

          // Mercado Pago envía el external_reference que nosotros definimos como el ID de la reserva
          const reservaId = urlParams.get('external_reference');
          const status = urlParams.get('status');

          if (reservaId && status === 'approved') {
            // Actualizamos Firestore. Esto activará el SnapshotListener en la App Android
            db.collection("reservas").doc(reservaId).update({
              estado: "pagado"
            }).then(() => {
              document.getElementById('loading').style.display = 'none';
              document.getElementById('content').style.display = 'block';
              console.log("Reserva " + reservaId + " actualizada a pagado");
            }).catch((error) => {
              console.error("Error actualizando: ", error);
              showError("Error al actualizar la base de datos.");
            });
          } else {
            showError("No se recibió una confirmación de pago válida.");
          }
        } catch (e) {
          console.error(e);
          showError("Error de inicialización.");
        }

        function showError(msg) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('error').style.display = 'block';
          document.getElementById('error-msg').textContent = msg;
        }
      });
    </script>
  </body>
</html>
